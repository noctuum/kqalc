name: APT Repository

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-apt:
    runs-on: ubuntu-latest
    steps:
      - name: Install APT tools
        run: sudo apt-get install -y dpkg-dev apt-utils

      - name: Import GPG key
        env:
          APT_GPG_KEY: ${{ secrets.APT_GPG_KEY }}
        run: echo "$APT_GPG_KEY" | gpg --batch --import

      - name: Checkout gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          git clone --single-branch --branch gh-pages \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git" repo 2>/dev/null || {
            mkdir repo && cd repo && git init && git checkout --orphan gh-pages
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git"
          }
          touch repo/.nojekyll

      - name: Download .deb packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p repo/pool/main/k/kqalc
          gh release download "$TAG" \
            --repo "$GH_REPO" \
            --pattern '*.deb' --dir repo/pool/main/k/kqalc/

      - name: Generate repository metadata
        run: |
          cd repo
          for arch in amd64 arm64; do
            mkdir -p dists/stable/main/binary-${arch}
            dpkg-scanpackages --arch ${arch} pool/ > dists/stable/main/binary-${arch}/Packages
            gzip -k -f dists/stable/main/binary-${arch}/Packages
          done
          cd dists/stable
          apt-ftparchive release \
            -o APT::FTPArchive::Release::Origin="kqalc" \
            -o APT::FTPArchive::Release::Label="kqalc" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Description="Full qalculate power in KRunner" \
            . > Release
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --armor --clearsign -o InRelease Release

      - name: Export public key
        run: gpg --armor --export > repo/gpg-key.asc

      - name: Push to gh-pages
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || {
            git commit -m "Update APT repo for ${TAG}"
            git push origin gh-pages
          }
